<!doctype html>

<head>

  <style>
    :root,
    .sw-root {
      --sw-bg: #090909;
      --sw-ink: #ffffff;
      --sw-ink-soft: #d3d3d3;
      --sw-accent: #ff2b2b;
      --sw-font-display: "PingFang TC", "Noto Sans TC", system-ui, sans-serif;
      --sw-font-body: "PingFang TC", "Noto Sans TC", system-ui, sans-serif;
    }

    :root {
      --mobile-focus-x: 81%;
      --mobile-pan-x: 0px;
    }

    body {
      min-height: 100%;
    }

    .sw-root .sw-copylayer::before {
      right: 0;
      left: auto;
      background: linear-gradient(
        270deg,
        rgba(5, 9, 12, 0.94) 0%,
        rgba(5, 9, 12, 0.78) 34%,
        rgba(5, 9, 12, 0.24) 64%,
        transparent 100%
      );
    }

    .sw-root .sw-copy {
      right: clamp(42px, 6vw, 82px);
      left: auto;
      padding-right: clamp(18px, 2vw, 28px);
      border-right: 4px solid #ff2b2b;
      text-align: right;
    }

    .sw-root .sw-copy__eyebrow {
      letter-spacing: 0.24em;
    }

    .sw-root .sw-copy__title {
      max-width: 10ch;
      margin-left: auto;
      font-size: clamp(2.8rem, 5.2vw, 5.4rem);
      line-height: 0.94;
      letter-spacing: -0.045em;
    }

    .sw-root .sw-copy__body {
      margin-left: auto;
    }

    .sw-root .sw-copy__tags li {
      color: #fff;
      background: rgba(255, 43, 43, 0.16);
      border-color: rgba(255, 43, 43, 0.46);
    }

    .sw-root .sw-copy__tags,
    .sw-root .sw-copy__cta {
      justify-content: flex-end;
    }

    .sw-root .sw-brand__mark {
      width: 30px;
      height: 12px;
      border-radius: 1px;
      background: #ff2b2b;
      box-shadow: 0 0 0 5px rgba(255, 43, 43, 0.14);
    }

    .sw-root .sw-topcta,
    .sw-root .sw-btn--primary {
      color: #fff;
      background: #ff2b2b;
    }

    @media (max-width: 860px) {
      .sw-root .sw-copylayer::before {
        background: linear-gradient(
          0deg,
          rgba(5, 9, 12, 0.96) 6%,
          rgba(5, 9, 12, 0.7) 48%,
          transparent 100%
        );
      }

      .sw-root .sw-copy {
        bottom: calc(
          clamp(124px, 18dvh, 164px) + env(safe-area-inset-bottom)
        );
      }

      .sw-root .sw-hint {
        bottom: calc(16px + env(safe-area-inset-bottom));
      }
    }

    @media (max-width: 600px) and (orientation: portrait) {
      .sw-root .sw-scene__still {
        object-position: var(--mobile-focus-x) 50%;
      }

      .sw-root .sw-scene__video {
        right: auto;
        width: auto;
        max-width: none;
        height: 100%;
        object-fit: fill;
        object-position: center;
        transform: translate3d(var(--mobile-pan-x), 0, 0);
        backface-visibility: hidden;
        will-change: transform;
      }

      .sw-root .sw-copy {
        right: clamp(18px, 5vw, 32px);
        left: clamp(18px, 5vw, 32px);
        padding-right: 18px;
        opacity: 1 !important;
      }

      .sw-root .sw-copy > * {
        will-change: opacity, transform;
      }

      .sw-root .sw-copy__eyebrow,
      .sw-root .sw-copy__title,
      .sw-root .sw-copy__body,
      .sw-root .sw-copy__tags,
      .sw-root .sw-copy__cta {
        margin-top: 20px;
      }

      .sw-root .sw-copy__title {
        font-size: clamp(2.25rem, 10vw, 3.4rem);
      }
    }
  </style>
</head>
<body>

  <main id="world">
    <section data-sw-seo>
      <h1>讓品牌，站上城市視線</h1>
      <p>大型戶外電視廣告版位招商中，由真納視覺文化股份有限公司提供洽詢服務。</p>
      <p><a href="tel:0424722099">洽詢電話：04-2472-2099</a></p>

  </main>

  <script src="scrub-engine.js"></script>
  <script>
    mountScrollWorld(document.getElementById('world'), {
      brand: { name: '真納視覺文化', href: '#top' },
      cta: { label: '洽詢 04-2472-2099', href: 'tel:0424722099' },
      hint: '向下捲動進入現場',
      nav: false,
      atmosphere: false,
      diveScroll: 2.2,
      scrollMobileFactor: 1.25,
      crossfade: 0.08,
      sections: [
        {
          id: 'city-flight',
          label: '大型戶外電視',
          still: 'assets/city-flight-still.webp',
          poster: 'assets/city-flight-poster.webp',
          clip: 'assets/vid/city-flight.mp4',
          clipMobile: 'assets/vid/city-flight-m.mp4',
          posterMobile: 'assets/city-flight-poster-m.webp',
          accent: '#ff2b2b',
          scroll: 2.2,
          linger: 0.08,
          eyebrow: '大型戶外電視・廣告招商',
          title: '讓品牌，站上城市視線',
          body: '真納視覺文化股份有限公司提供大型戶外電視廣告版位洽詢，讓品牌訊息進入城市日常。',
          tags: ['攝影', '設計', '印刷'],
          cta: {
            primary: { label: '洽詢 04-2472-2099', href: 'tel:0424722099' }
          }
        }
      ],
      connectors: [],
      connectorsMobile: []
    });

    (() => {
      const focusStops = [
        { progress: 0, focus: 81 },
        { progress: 1, focus: 19 }
      ];
      const copyExitStops = [
        { selector: '.sw-copy__num', start: 0.04, end: 0.14 },
        { selector: '.sw-copy__eyebrow', start: 0.07, end: 0.18 },
        { selector: '.sw-copy__title', start: 0.13, end: 0.28 },
        { selector: '.sw-copy__body', start: 0.2, end: 0.35 },
        { selector: '.sw-copy__tags', start: 0.27, end: 0.43 },
        { selector: '.sw-copy__cta', start: 0.34, end: 0.52 }
      ];
      let focusFramePending = false;

      function getTrackedFocus(progress) {
        for (let index = 1; index < focusStops.length; index += 1) {
          const next = focusStops[index];
          if (progress > next.progress) continue;
          const previous = focusStops[index - 1];
          const span = next.progress - previous.progress;
          const local = Math.min(
            1,
            Math.max(0, (progress - previous.progress) / span)
          );
          const eased = local * local * (3 - 2 * local);
          return previous.focus + (next.focus - previous.focus) * eased;
        }
        return focusStops[focusStops.length - 1].focus;
      }

      function updateMobileCopyExit(progress) {
        const isMobilePortrait = window.matchMedia(
          '(max-width: 600px) and (orientation: portrait)'
        ).matches;

        copyExitStops.forEach(({ selector, start, end }) => {
          const element = document.querySelector(selector);
          if (!element) return;
          if (!isMobilePortrait) {
            element.style.removeProperty('opacity');
            element.style.removeProperty('transform');
            return;
          }

          const local = Math.min(
            1,
            Math.max(0, (progress - start) / (end - start))
          );
          const eased = local * local * (3 - 2 * local);
          element.style.opacity = (1 - eased).toFixed(3);
          element.style.transform = `translateY(${(-18 * eased).toFixed(2)}px)`;
        });
      }

      function updateMobileFocus() {
        const maxScroll = Math.max(
          1,
          document.documentElement.scrollHeight - window.innerHeight
        );
        const progress = Math.min(1, Math.max(0, window.scrollY / maxScroll));
        const focus = getTrackedFocus(progress);
        document.documentElement.style.setProperty(
          '--mobile-focus-x',
          `${focus.toFixed(2)}%`
        );
        const mobilePortrait = window.matchMedia(
          '(max-width: 600px) and (orientation: portrait)'
        ).matches;
        const mediaWidth = window.innerHeight * (16 / 9);
        const overflow = Math.max(0, mediaWidth - window.innerWidth);
        const panX = mobilePortrait ? -(overflow * focus) / 100 : 0;
        document.documentElement.style.setProperty(
          '--mobile-pan-x',
          `${panX.toFixed(2)}px`
        );
        updateMobileCopyExit(progress);
        focusFramePending = false;
      }

      function scheduleMobileFocus() {
        if (focusFramePending) return;
        focusFramePending = true;
        window.requestAnimationFrame(updateMobileFocus);
      }

      window.addEventListener('scroll', scheduleMobileFocus, { passive: true });
      window.addEventListener('resize', scheduleMobileFocus);
      window.addEventListener('orientationchange', scheduleMobileFocus);
      updateMobileFocus();
    })();
  </script>
</body>
</html>
